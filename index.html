<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Richmond Lab VR Launcher</title>

<script src="qrcode.min.js"></script>
<script src="scorm.js"></script>

<style>
body{
    text-align:center;
    background:#ffffff;
    font-family:Arial, Helvetica, sans-serif;
}

h2{ margin-top:40px; }

#qrcode{ margin-top:60px; }

#status{
    margin-top:20px;
    color:#555;
}
</style>

</head>

<body>

<h2>Scan QR using Quest Headset</h2>

<div id="qrcode"></div>
<div id="status">Creating VR Session...</div>

<script>

// ======================================================
// CONFIG
// ======================================================

const MIDDLEWARE =
"https://5466-2405-201-e038-30a3-4c80-3ea9-a6fc-ea79.ngrok-free.app";   // ⭐ CHANGE THIS


// ======================================================
// SAFE SCORM INITIALIZATION
// ======================================================

let learnerID = "guest";
let learnerName = "Guest";

try
{
    ScormInitialize();

    const id = ScormGetValue("cmi.core.student_id");
    const name = ScormGetValue("cmi.core.student_name");

    if(id) learnerID = id;
    if(name) learnerName = name;

    console.log("SCORM User:", learnerID);

}
catch(e)
{
    console.log("SCORM API not found (local testing)");
}


// ======================================================
// CREATE SESSION FROM NGROK SERVER
// ======================================================

async function createSession()
{
    try
    {
        document.getElementById("status").innerText =
        "Connecting to VR server...";

        const response = await fetch(
            MIDDLEWARE + "/create-session",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "ngrok-skip-browser-warning":"true"
                },
                body: JSON.stringify({
                    learnerId: learnerID,
                    learnerName: learnerName
                })
            }
        );

        const data = await response.json();

        if(!data.code)
            throw new Error("Session not created");

        const token = data.code;

        console.log("SESSION CODE:", token);


        // ======================================================
        // SAVE SESSION INTO SCORM
        // ======================================================

        try
        {
            ScormSetValue("cmi.core.lesson_location", token);
            ScormCommit();
        }
        catch(e){}


        // ======================================================
        // CREATE QUEST DEEPLINK
        // ======================================================

        const deeplink =
        "richmondlab://launch" +
        "?token=" + token +
        "&user=" + learnerID;


        // ======================================================
        // GENERATE QUEST QR CODE
        // ======================================================

        new QRCode(
            document.getElementById("qrcode"),
            {
                text: deeplink,
                width:420,
                height:420,
                colorDark:"#000000",
                colorLight:"#ffffff",
                correctLevel:QRCode.CorrectLevel.L
            }
        );

        document.getElementById("status").innerText =
        "Scan QR in Quest headset";

        console.log("DEEPLINK:", deeplink);

    }
    catch(err)
    {
        console.error(err);

        document.getElementById("status").innerText =
        "❌ Failed to create VR session";
    }
}


// ======================================================
// START
// ======================================================

createSession();

</script>

</body>
</html>
