<!DOCTYPE html>
<html>
<head>
<script src="qrcode.min.js"></script>
<script src="scorm.js"></script>

<style>
body{
    text-align:center;
    background:white;
    font-family:Arial;
}
#qrcode{
    margin-top:60px;
}
</style>
</head>

<body>

<h2>Scan with Quest</h2>

<div id="qrcode"></div>

<script>

// --------------------
// INIT SCORM
// --------------------
ScormInitialize();

// Store learner info
const learner =
ScormGetValue("cmi.core.student_id");

// Create session token
const token =
Math.random().toString(36).substring(2,8);

// Save token in SCORM attempt
ScormSetValue("cmi.core.lesson_location", token);
ScormCommit();

// --------------------
// CREATE DEEPLINK
// --------------------
const deeplink =
"richmondlab://launch?token=" +
token +
"&user=" +
learner;

// --------------------
// GENERATE QR
// --------------------
new QRCode(
document.getElementById("qrcode"),
{
    text: deeplink,
    width: 420,
    height: 420,
    colorDark:"#000000",
    colorLight:"#ffffff",
    correctLevel:QRCode.CorrectLevel.L
});

</script>

</body>
</html>
