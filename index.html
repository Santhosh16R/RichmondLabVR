<!DOCTYPE html>
<html>
<head>
<script src="qrcode.min.js"></script>

<style>
body{
    text-align:center;
    background:white;
    font-family:Arial;
}

#qrcode{
    margin-top:60px;
}
</style>

</head>

<body>

<h2>Scan with Quest</h2>

<div id="qrcode"></div>

<script>

/* SHORT TOKEN */
const token =
Math.random().toString(36).substring(2,8);

/* DEEP LINK */
const deeplink =
"richmondlab://" + token;

/* QUEST OPTIMIZED QR */
new QRCode(document.getElementById("qrcode"),{

    text: deeplink,

    width: 420,
    height: 420,

    colorDark : "#000000",
    colorLight : "#ffffff",

    correctLevel : QRCode.CorrectLevel.L
});

</script>

</body>
</html>
